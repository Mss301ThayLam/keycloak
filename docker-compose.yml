version: "3.9"

services:
  kc-postgres:
    image: postgres:16
    container_name: kc-postgres
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pwd
    # ports:
    #   - "5441:5432"
    volumes:
      - kc_pgdata:/var/lib/postgresql/data
    networks:
      - kc-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: always
    depends_on:
      - kc-postgres
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://kc-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pwd

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: micropc-keycloak.duckdns.org
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded

      # Disable theme caching for development
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    # ports:
    #   - "8080:8080"
    volumes:
      - ./themes/MicroPC:/opt/keycloak/themes/MicroPC
    networks:
      - kc-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - keycloak
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - kc-net

volumes:
  kc_pgdata:

networks:
  kc-net:
